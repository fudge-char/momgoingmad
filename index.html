<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: 'Georgia', serif;
    }

    .container {
      text-align: center;
    }

    .graphic {
      font-size: 6rem;
      margin-bottom: 1.5rem;
      animation: bob 2s ease-in-out infinite;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .text {
      font-size: 1.5rem;
      color: #ffffff;
      letter-spacing: 0.1em;
      font-weight: 400;
      margin-top: 0.75rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="graphic">🧠💡🙇</div>
    <div class="text">Refay = genius.</div>
    <div class="text">Fudge = humbled. Problem solved. Thank you!</div>
  </div>
</body>
</html>
